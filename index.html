

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Ponto</title>

<!-- ✅ jsPDF CARREGADO CORRETAMENTE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --azul:#2c7be5;
  --vermelho:#c0392b;
  --verde:#28a745;
  --cinza:#f4f6f8;
}

body{
  font-family:Arial,sans-serif;
  background:var(--cinza);
  margin:0;
  padding:12px;
}

.container{max-width:900px;margin:auto;}

.card{
  background:#fff;
  padding:16px;
  border-radius:10px;
  margin-bottom:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

label{font-weight:bold;display:block;margin-top:10px;}

input[type="date"],
input[type="time"]{
  width:100%;
  padding:10px;
  margin-top:4px;
}

/* ✅ Hora extra alinhada */
.checkbox-inline{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:12px;
  cursor:pointer;
}

.actions{
  display:flex;
  gap:10px;
  margin-top:14px;
  flex-wrap:wrap;
}

button{
  border:none;
  border-radius:8px;
  padding:12px 16px;
  font-weight:bold;
  cursor:pointer;
  color:#fff;
}

.btn-entrada{background:var(--azul);}
.btn-saida{background:var(--vermelho);}
.btn-pdf{background:var(--verde);}
.btn-edit{background:#6c757d;}
.btn-delete{background:#000;}

table{width:100%;border-collapse:collapse;}

th,td{
  padding:8px;
  border-bottom:1px solid #ddd;
  text-align:center;
}

th{background:#f1f3f5;}

.badge{
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.normal{background:#e7f6eb;color:#28a745;}
.banco{background:#e6f0ff;color:#004b8d;}
.extra{background:#fdecea;color:#c0392b;}

/* ✅ Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:flex;
  align-items:center;
  justify-content:center;
}

.hidden{display:none;}

.modal-box{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:320px;
}
</style>
</head>

<body>
<div class="container">

<h2>🕒 Controle de Ponto</h2>

<div class="card">
  <label>Data</label>
  <input type="date" id="data">

  <label>Hora</label>
  <input type="time" id="hora">

  <label class="checkbox-inline">
    <input type="checkbox" id="horaExtra">
    Hora Extra
  </label>

  <div class="actions">
    <button class="btn-entrada" onclick="registrarEntrada()">Entrada</button>
    <button class="btn-saida" onclick="registrarSaida()">Saída</button>
    <button class="btn-pdf" onclick="gerarPDF()">Gerar PDF</button>
  </div>

  <div id="status"></div>
</div>

<div class="card">
<h3>📋 Registros</h3>
<table>
<thead>
<tr>
  <th>Data</th>
  <th>Entrada</th>
  <th>Saída</th>
  <th>Horas</th>
  <th>Classificação</th>
  <th>Ações</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>
</div>

<!-- ✅ MODAL DE EDIÇÃO -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <h3>Editar Registro</h3>
    <input type="hidden" id="editData">
    <input type="hidden" id="editId">

    <label>Entrada</label>
    <input type="time" id="editEntrada">

    <label>Saída</label>
    <input type="time" id="editSaida">

    <label class="checkbox-inline">
      <input type="checkbox" id="editExtra">
      Hora Extra
    </label>

    <div class="actions">
      <button class="btn-entrada" onclick="salvarEdicao()">Salvar</button>
      <button class="btn-saida" onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
const { jsPDF } = window.jspdf;
const JORNADA = 570;

/* UTIL */
const getPontos=()=>JSON.parse(localStorage.getItem("pontos"))||{};
const salvar=p=>localStorage.setItem("pontos",JSON.stringify(p));
const uid=()=>Math.random().toString(16).slice(2,9);

function minutos(e,s){
  if(!e||!s) return 0;
  let [h1,m1]=e.split(":").map(Number);
  let [h2,m2]=s.split(":").map(Number);
  let i=h1*60+m1,f=h2*60+m2;
  if(f<i) f+=1440;
  return f-i;
}
const hmin=m=>`${Math.floor(m/60)}h ${m%60}min`;
const br=d=>d.split("-").reverse().join("/");

/* CLASSIFICA */
function classificar(r){
  const t=minutos(r.entrada,r.saida);
  if(r.tipo==="extra") return {txt:"Hora Extra",cls:"extra"};
  const s=t-JORNADA;
  if(s===0) return {txt:"Normal",cls:"normal"};
  return {txt:s>0?"Banco (+)":"Banco (-)",cls:"banco"};
}

/* ENTRADA */
function registrarEntrada(){
  if(!data.value||!hora.value) return alert("Preencha data e hora");
  const p=getPontos();
  p[data.value]=p[data.value]||{registros:[]};
  if(p[data.value].registros.some(r=>!r.saida))
    return alert("Já existe uma entrada aberta");
  p[data.value].registros.push({
    id:uid(),entrada:hora.value,saida:"",tipo:horaExtra.checked?"extra":"normal"
  });
  salvar(p);carregar();
}

/* SAÍDA */
function registrarSaida(){
  const p=getPontos();
  if(!p[data.value]) return alert("Nenhuma entrada");
  const r=p[data.value].registros.find(r=>!r.saida);
  if(!r) return alert("Nenhuma entrada aberta");
  r.saida=hora.value;
  salvar(p);carregar();
}

/* TABELA */
function carregar(){
  tabela.innerHTML="";
  const p=getPontos();
  Object.keys(p).sort().forEach(d=>{
    p[d].registros.forEach(r=>{
      const m=minutos(r.entrada,r.saida);
      const c=classificar(r);
      tabela.innerHTML+=`
      <tr>
        <td>${br(d)}</td>
        <td>${r.entrada}</td>
        <td>${r.saida||"-"}</td>
        <td>${m?hmin(m):"-"}</td>
        <td><span class="badge ${c.cls}">${c.txt}</span></td>
        <td>
          <button class="btn-edit" onclick="editar('${d}','${r.id}')">✏️</button>
          <button class="btn-delete" onclick="excluir('${d}','${r.id}')">🗑️</button>
        </td>
      </tr>`;
    });
  });
}

/* ✅ EDITAR */
function editar(d,id){
  const r=getPontos()[d].registros.find(x=>x.id===id);
  editData.value=d;
  editId.value=id;
  editEntrada.value=r.entrada;
  editSaida.value=r.saida;
  editExtra.checked=r.tipo==="extra";
  modal.classList.remove("hidden");
}

function salvarEdicao(){
  const p=getPontos();
  const r=p[editData.value].registros.find(x=>x.id===editId.value);
  r.entrada=editEntrada.value;
  r.saida=editSaida.value;
  r.tipo=editExtra.checked?"extra":"normal";
  salvar(p);fecharModal();carregar();
}

function fecharModal(){modal.classList.add("hidden");}

function excluir(d,id){
  if(!confirm("Excluir registro?")) return;
  const p=getPontos();
  p[d].registros=p[d].registros.filter(r=>r.id!==id);
  salvar(p);carregar();
}

/* ✅ PDF FUNCIONANDO */
function gerarPDF(){
  const doc=new jsPDF();
  let y=20;
  doc.text("Relatório de Ponto",105,y,{align:"center"});
  y+=10;

  const p=getPontos();
  Object.keys(p).sort().forEach(d=>{
    p[d].registros.forEach(r=>{
      doc.text(
        `${br(d)} | ${r.entrada}-${r.saida||"--"} | ${hmin(minutos(r.entrada,r.saida))}`,
        10,y
      );
      y+=6;
      if(y>280){doc.addPage();y=20;}
    });
  });
  doc.save("ponto.pdf");
}

/* INIT */
(()=>{
  const n=new Date();
  data.value=n.toISOString().split("T")[0];
  hora.value=n.toTimeString().slice(0,5);
  carregar();
})();
</script>

</body>
</html>
