
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Controle de Ponto</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}
input, textarea, button, label {
    padding: 6px;
    margin: 5px 0;
}
textarea {
    width: 100%;
    height: 60px;
}
button {
    cursor: pointer;
}
table {
    border-collapse: collapse;
    margin-top: 20px;
    width: 100%;
}
th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}
th {
    background: #f2f2f2;
}
.obs-box {
    margin-top: 30px;
    border-top: 2px solid #ccc;
    padding-top: 15px;
}
.status {
    font-weight: bold;
    margin-top: 10px;
}
.extra {
    color: #b30000;
    font-weight: bold;
}
.banco {
    color: #004b8d;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>🕒 Controle de Ponto</h2>

<label>Data:</label><br>
<input type="date" id="data"><br>

<label>Hora:</label><br>
<input type="time" id="hora"><br>

<label>
  <input type="checkbox" id="horaExtra">
  Marcar dia como <b>Hora Extra</b>
</label><br><br>

<button onclick="registrar()">Registrar <span id="tipo">Entrada</span></button>
<button onclick="gerarPDF()">Gerar Relatório PDF</button>

<div id="status" class="status"></div>

<div class="obs-box">
<h3>📝 Observações</h3>

<label>Data da observação:</label><br>
<input type="date" id="dataObs"><br>

<label>Observação:</label><br>
<textarea id="textoObs"></textarea><br>

<button onclick="adicionarObservacao()">Adicionar Observação</button>
</div>

<h3>📋 Registros</h3>

<table>
<thead>
<tr>
    <th>Data</th>
    <th>Entrada</th>
    <th>Saída</th>
    <th>Horas</th>
    <th>Classificação</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>
const { jsPDF } = window.jspdf;
const JORNADA_PADRAO = 570; // 9h30 em minutos

/* Utilidades */
function preencherAgora() {
    const agora = new Date();
    const iso = agora.toISOString().split("T")[0];
    data.value = iso;
    dataObs.value = iso;
    hora.value = agora.toTimeString().slice(0,5);
}

function formatarDataBR(dataISO) {
    const [a,m,d] = dataISO.split("-");
    return `${d}/${m}/${a}`;
}

function minutosTrabalhados(e,s){
    if(!e || !s) return 0;
    const [h1,m1] = e.split(":").map(Number);
    const [h2,m2] = s.split(":").map(Number);
    return (h2*60+m2) - (h1*60+m1);
}

function formatarMin(min){
    const h = Math.floor(min / 60);
    const m = min % 60;
    return `${h}h ${m}min`;
}

/* Registrar ponto */
function registrar(){
    const d = data.value;
    const h = hora.value;
    const extraMarcado = horaExtra.checked;

    let pontos = JSON.parse(localStorage.getItem("pontos")) || {};

    if (!pontos[d]) {
        pontos[d] = { entrada: h, saida: "", extra: extraMarcado };
        tipo.textContent = "Saída";
    } else if (!pontos[d].saida) {
        pontos[d].saida = h;
        pontos[d].extra = pontos[d].extra || extraMarcado;
        tipo.textContent = "Entrada";
    } else {
        status.textContent = "⚠️ Entrada e saída já registradas neste dia";
        return;
    }

    localStorage.setItem("pontos", JSON.stringify(pontos));
    status.textContent = "✅ Registro gravado";
    carregarTabela();
}

/* Observações */
function adicionarObservacao(){
    if(!dataObs.value || !textoObs.value) {
        alert("Preencha data e observação");
        return;
    }
    let obs = JSON.parse(localStorage.getItem("obs")) || [];
    obs.push({ data: dataObs.value, texto: textoObs.value });
    localStorage.setItem("obs", JSON.stringify(obs));
    textoObs.value = "";
    alert("Observação registrada");
}

/* Atualiza tabela na tela */
function carregarTabela(){
    tabela.innerHTML = "";
    const pontos = JSON.parse(localStorage.getItem("pontos")) || {};

    Object.keys(pontos).sort().forEach(d => {
        const r = pontos[d];
        const min = minutosTrabalhados(r.entrada, r.saida);

        let tipoTxt = "Normal";
        let classe = "";

        if (r.extra) {
            tipoTxt = "Hora Extra";
            classe = "extra";
        } else if (min > JORNADA_PADRAO) {
            tipoTxt = "Banco de Horas";
            classe = "banco";
        }

        tabela.innerHTML += `
            <tr>
                <td>${d}</td>
                <td>${r.entrada}</td>
                <td>${r.saida || "-"}</td>
                <td>${min ? formatarMin(min) : "-"}</td>
                <td class="${classe}">${tipoTxt}</td>
            </tr>
        `;
    });
}

/* PDF COMPLETO */
function gerarPDF(){
    const pontos = JSON.parse(localStorage.getItem("pontos")) || {};
    const obs = JSON.parse(localStorage.getItem("obs")) || [];
    const datas = Object.keys(pontos).sort();

    let totalExtra = 0;
    let totalBanco = 0;

    const doc = new jsPDF("p","mm","a4");
    const pageW = doc.internal.pageSize.getWidth();
    const margin = 15;
    const usable = pageW - margin * 2;

    const colW = [
        usable * 0.18,
        usable * 0.16,
        usable * 0.16,
        usable * 0.20,
        usable * 0.30
    ];

    const rowH = 8;
    let x = margin;
    let y = 22;

    doc.setFontSize(14);
    doc.text("Relatório Mensal de Ponto", pageW/2, 14, { align: "center" });

    doc.setFontSize(10);

    function drawRow(values) {
        let xi = x;
        values.forEach((v, i) => {
            doc.rect(xi, y, colW[i], rowH);
            doc.text(String(v), xi + colW[i]/2, y + 5, { align: "center" });
            xi += colW[i];
        });
        y += rowH;
    }

    drawRow(["Data","Entrada","Saída","Horas","Classificação"]);

    datas.forEach(d => {
        const r = pontos[d];
        const min = minutosTrabalhados(r.entrada, r.saida);

        let tipo = "Normal";

        if (r.extra) {
            tipo = "HORA EXTRA";
            totalExtra += min;
        } else if (min > JORNADA_PADRAO) {
            tipo = "BANCO DE HORAS";
            totalBanco += (min - JORNADA_PADRAO);
        }

        drawRow([
            formatarDataBR(d),
            r.entrada || "-",
            r.saida || "-",
            min ? formatarMin(min) : "-",
            tipo
        ]);
    });

    /* Resumo */
    y += 10;
    doc.setFontSize(12);
    doc.text("Resumo do Mês", margin, y);
    y += 6;

    doc.setFontSize(10);
    doc.text(`Total de Horas Extras: ${formatarMin(totalExtra)}`, margin, y);
    y += 5;
    doc.text(`Total de Banco de Horas: ${formatarMin(totalBanco)}`, margin, y);

    /* Observações */
    if (obs.length) {
        y += 10;
        doc.setFontSize(12);
        doc.text("Observações", margin, y);
        y += 6;

        doc.setFontSize(10);
        obs.forEach(o => {
            if (y > 280) return;
            doc.text(`• ${formatarDataBR(o.data)} - ${o.texto}`, margin, y, { maxWidth: usable });
            y += 6;
        });
    }

    doc.save("relatorio-ponto.pdf");
}

/* Init */
preencherAgora();
carregarTabela();
</script>

</body>
</html>
