
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Ponto</title>

<!-- jsPDF (OBRIGATÓRIO) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
  --azul:#2c7be5;
  --verde:#28a745;
  --vermelho:#b30000;
  --cinza:#f4f6f8;
}

body {
  margin:0;
  padding:12px;
  background:var(--cinza);
  font-family:Arial,sans-serif;
}

.container {
  max-width:900px;
  margin:auto;
}

h2,h3 { margin:0 0 12px; }

.card {
  background:#fff;
  border-radius:10px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

label {
  display:block;
  font-weight:bold;
  margin-top:10px;
}

input, textarea {
  width:100%;
  padding:10px;
  font-size:16px;
  border-radius:6px;
  border:1px solid #ccc;
  margin-top:4px;
}

input[type="time"] {
  font-size:14px;
  padding:6px 8px;
}

textarea {
  resize:vertical;
  min-height:70px;
}

/* Hora Extra */
.hora-extra-box {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:14px;
}

.hora-extra-box input {
  width:22px;
  height:22px;
  cursor:pointer;
}

.hora-extra-box label {
  cursor:pointer;
  font-weight:bold;
}

.actions {
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:14px;
}

button {
  border:none;
  border-radius:8px;
  padding:14px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button.primary { background:var(--azul); color:#fff; }
button.secondary { background:#6c757d; color:#fff; }

.status { margin-top:10px; font-weight:bold; }

/* Tabela */
.table-wrap { overflow-x:auto; }

table {
  border-collapse:collapse;
  width:100%;
  min-width:600px;
}

th,td {
  padding:10px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

th { background:#f1f3f5; }

/* Badges */
.badge {
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  font-weight:bold;
}

.badge.extra { background:#ffe5e5; color:var(--vermelho); }
.badge.banco { background:#e6f0ff; color:#004b8d; }
.badge.normal { background:#e7f6eb; color:var(--verde); }

@media (min-width:600px) {
  .actions { flex-direction:row; }
}
</style>
</head>

<body>
<div class="container">

<h2>🕒 Controle de Ponto</h2>

<div class="card">
  <label>Data</label>
  <input type="date" id="data">

  <label>Hora</label>
  <input type="time" id="hora">

  <div class="hora-extra-box">
    <input type="checkbox" id="horaExtra">
    <label for="horaExtra">Hora Extra</label>
  </div>

  <div class="actions">
    <button class="primary" onclick="registrar()">Registrar <span id="tipo">Entrada</span></button>
    <button class="secondary" onclick="gerarPDF()">Gerar PDF</button>
  </div>

  <div id="status" class="status"></div>
</div>

<div class="card">
  <h3>📝 Observações</h3>
  <label>Data</label>
  <input type="date" id="dataObs">
  <label>Observação</label>
  <textarea id="textoObs"></textarea>
  <button class="primary" onclick="adicionarObservacao()" style="margin-top:10px;">Adicionar Observação</button>
</div>

<div class="card">
  <h3>📋 Registros</h3>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Data</th><th>Entrada</th><th>Saída</th><th>Horas</th><th>Classificação</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>
</div>

</div>

<script>
const { jsPDF } = window.jspdf;
const JORNADA_PADRAO = 570;

function preencherAgora() {
  const a = new Date();
  const d = a.toISOString().split("T")[0];
  data.value = d;
  dataObs.value = d;
  hora.value = a.toTimeString().slice(0,5);
}

function formatarDataBR(d) {
  const [a,m,di] = d.split("-");
  return `${di}/${m}/${a}`;
}

function minutosTrabalhados(e,s) {
  if(!e||!s) return 0;
  let [h1,m1]=e.split(":").map(Number);
  let [h2,m2]=s.split(":").map(Number);
  let ini=h1*60+m1, fim=h2*60+m2;
  if(fim<ini) fim+=1440;
  return fim-ini;
}

function formatarMin(m) {
  return `${Math.floor(m/60)}h ${m%60}min`;
}

function registrar() {
  let pontos=JSON.parse(localStorage.getItem("pontos"))||{};
  const d=data.value, h=hora.value, extra=horaExtra.checked;

  if(!pontos[d]) {
    pontos[d]={entrada:h,saida:"",extra};
    tipo.textContent="Saída";
  } else if(!pontos[d].saida) {
    pontos[d].saida=h;
    pontos[d].extra ||= extra;
    tipo.textContent="Entrada";
  } else {
    status.textContent="⚠️ Dia já completo";
    return;
  }

  localStorage.setItem("pontos",JSON.stringify(pontos));
  status.textContent="✅ Registro salvo";
  carregarTabela();
}

function adicionarObservacao() {
  if(!dataObs.value||!textoObs.value) return alert("Preencha tudo");
  let obs=JSON.parse(localStorage.getItem("obs"))||[];
  obs.push({data:dataObs.value,texto:textoObs.value});
  localStorage.setItem("obs",JSON.stringify(obs));
  textoObs.value="";
  alert("Observação salva");
}

function carregarTabela() {
  tabela.innerHTML="";
  const pontos=JSON.parse(localStorage.getItem("pontos"))||{};
  Object.keys(pontos).sort().forEach(d=>{
    const r=pontos[d];
    const min=minutosTrabalhados(r.entrada,r.saida);
    let tipo="Normal",badge="normal";
    if(r.extra){tipo="Hora Extra";badge="extra";}
    else if(min>JORNADA_PADRAO){tipo="Banco de Horas";badge="banco";}

    tabela.innerHTML+=`
      <tr>
        <td>${formatarDataBR(d)}</td>
        <td>${r.entrada}</td>
        <td>${r.saida||"-"}</td>
        <td>${min?formatarMin(min):"-"}</td>
        <td><span class="badge ${badge}">${tipo}</span></td>
      </tr>`;
  });
}

function gerarPDF() {
  const pontos=JSON.parse(localStorage.getItem("pontos"))||{};
  const datas=Object.keys(pontos).sort();
  const doc=new jsPDF();
  const margin=10, usable=190;
  const col=[34,32,32,34,58];
  let y=20, totalExtra=0, totalBanco=0;

  function header(){
    let x=margin;
    ["Data","Entrada","Saída","Horas","Classificação"].forEach((t,i)=>{
      doc.rect(x,y,col[i],8);
      doc.text(t,x+col[i]/2,y+5,{align:"center"});
      x+=col[i];
    });
    y+=8;
  }

  header();

  datas.forEach(d=>{
    if(y>270){ doc.addPage(); y=20; header(); }
    const r=pontos[d], min=minutosTrabalhados(r.entrada,r.saida);
    let tipo="Normal";
    if(r.extra){ tipo="Hora Extra"; totalExtra+=min; }
    else if(min>JORNADA_PADRAO){ tipo="Banco"; totalBanco+=min-JORNADA_PADRAO; }

    let x=margin;
    [formatarDataBR(d),r.entrada,r.saida||"-",formatarMin(min),tipo].forEach((v,i)=>{
      doc.rect(x,y,col[i],8);
      doc.text(v,x+col[i]/2,y+5,{align:"center"});
      x+=col[i];
    });
    y+=8;
  });

  y+=10;
  doc.text(`Horas Extras: ${formatarMin(totalExtra)}`,margin,y);
  y+=6;
  doc.text(`Banco de Horas: ${formatarMin(totalBanco)}`,margin,y);

  doc.save("relatorio-ponto.pdf");
}

preencherAgora();
carregarTabela();
</script>

</body>
</html>
